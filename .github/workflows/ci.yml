name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adun_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d adun_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
      - name: Install pnpm
        run: npm install -g pnpm@8
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: adun_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: pnpm run migrate
      - name: Run tests
        run: pnpm test || true
